<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: Inter, sans-serif;
      background: #1E1E1E;
      color: #FFFFFF;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #1A1A1A;
      border-bottom: 1px solid #3D3D3D;
      flex-shrink: 0;
    }

    #url-display {
      flex: 1;
      font-size: 12px;
      color: #B3B3B3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: #2C2C2C;
      border-radius: 4px;
      padding: 5px 10px;
    }

    .btn {
      background: #2C2C2C;
      border: none;
      border-radius: 6px;
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 600;
      font-family: Inter, sans-serif;
      padding: 6px 14px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.1s;
    }

    .btn:hover { background: #3D3D3D; }
    .btn-primary { background: #18A0FB; }
    .btn-primary:hover { background: #1E90FF; }

    #error-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    #error-state .icon {
      font-size: 40px;
      opacity: 0.4;
    }

    #error-state h2 {
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
      margin: 0;
    }

    #error-state p {
      font-size: 13px;
      color: #999999;
      max-width: 380px;
      line-height: 1.5;
      margin: 0;
    }

    #error-url-text {
      font-size: 11px;
      color: #3D3D3D;
      background: #2C2C2C;
      padding: 6px 12px;
      border-radius: 4px;
      word-break: break-all;
      max-width: 420px;
    }

    #error-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    #frame {
      flex: 1;
      border: none;
      width: 100%;
      display: none;
    }

    #loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999999;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="url-display">—</span>
    <button class="btn" id="open-btn" style="display:none">Open in Browser ↗</button>
    <button class="btn" id="close-btn">✕ Close</button>
  </div>

  <div id="loading">Loading…</div>

  <div id="error-state">
    <div class="icon">🔒</div>
    <h2>Cannot embed this page</h2>
    <p>This site blocks embedding via <code>X-Frame-Options</code> or <code>Content-Security-Policy</code>. You can still open it directly in your browser.</p>
    <div id="error-url-text"></div>
    <div id="error-actions">
      <button class="btn btn-primary" id="open-external-btn">Open in Browser ↗</button>
      <button class="btn" id="close-btn-2">Close</button>
    </div>
  </div>

  <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>

  <script>
    var currentUrl = ''
    var loadTimer = null

    var frame = document.getElementById('frame')
    var loading = document.getElementById('loading')
    var errorState = document.getElementById('error-state')
    var urlDisplay = document.getElementById('url-display')
    var openBtn = document.getElementById('open-btn')
    var errorUrlText = document.getElementById('error-url-text')

    function close() {
      parent.postMessage({ pluginMessage: { type: 'close' } }, '*')
    }

    function openExternal() {
      window.open(currentUrl, '_blank')
    }

    document.getElementById('close-btn').onclick = close
    document.getElementById('close-btn-2').onclick = close
    document.getElementById('open-external-btn').onclick = openExternal
    openBtn.onclick = openExternal

    // Detect X-Frame-Options block: if the iframe loads but content is inaccessible
    // (cross-origin security error when accessing contentDocument), we show the error.
    frame.onload = function() {
      clearTimeout(loadTimer)
      try {
        // If the frame was blocked, contentDocument is null or throws
        var doc = frame.contentDocument || frame.contentWindow.document
        if (!doc || doc.URL === 'about:blank' || doc.body === null) {
          showError()
          return
        }
      } catch (e) {
        // Cross-origin: frame loaded something — show it, assume OK
      }
      showFrame()
    }

    frame.onerror = function() {
      clearTimeout(loadTimer)
      showError()
    }

    function showFrame() {
      loading.style.display = 'none'
      errorState.style.display = 'none'
      frame.style.display = 'block'
      openBtn.style.display = 'block'
    }

    function showError() {
      loading.style.display = 'none'
      frame.style.display = 'none'
      errorUrlText.textContent = currentUrl
      errorState.style.display = 'flex'
      openBtn.style.display = 'none'
    }

    window.onmessage = function(event) {
      var msg = event.data.pluginMessage
      if (msg && msg.type === 'load-url') {
        currentUrl = msg.url
        urlDisplay.textContent = currentUrl

        loading.style.display = 'flex'
        frame.style.display = 'none'
        errorState.style.display = 'none'
        openBtn.style.display = 'none'

        // Fallback: if onload hasn't fired in 8s, assume blocked
        clearTimeout(loadTimer)
        loadTimer = setTimeout(function() {
          showError()
        }, 8000)

        frame.src = currentUrl
      }
    }
  </script>
</body>
</html>
